services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: media_assets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2026-01-18T22-55-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  createbucket:
    image: minio/mc:RELEASE.2026-02-02T20-30-36Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      /usr/bin/mc mb --ignore-existing local/media-assets
      "

  app:
    build: .
    depends_on:
      - postgres
      - minio
      - createbucket
    env_file:
      - .env
    ports:
      - "3000:3000"
    command: bun run src/index.ts

volumes:
  postgres_data:
  minio_data:
